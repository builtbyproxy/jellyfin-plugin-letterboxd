<!DOCTYPE html>
<html>
<head>
    <title>Letterboxd Sync</title>
</head>
<body>
    <div id="letterboxdSyncConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button,emby-checkbox,emby-select">
        <div data-role="content">
            <div class="content-primary">
                <h2>Letterboxd Sync</h2>
                <p>Sync your Jellyfin watch history to your Letterboxd diary in real-time.</p>

                <div class="verticalSection">
                    <h3>User Accounts</h3>
                    <p class="fieldDescription">Map Jellyfin users to their Letterboxd accounts.</p>

                    <div id="accountsList"></div>

                    <button is="emby-button" type="button" class="raised button-submit" id="addAccountBtn"
                            style="margin-top: 1em;">
                        Add Account
                    </button>
                </div>

                <div style="margin-top: 2em;">
                    <button is="emby-button" type="button" class="raised button-submit" id="saveBtn">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <template id="accountTemplate">
        <div class="account-entry verticalSection" style="border: 1px solid #333; padding: 1em; margin-bottom: 1em; border-radius: 4px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h4 class="account-title" style="margin: 0;">Account</h4>
                <button is="emby-button" type="button" class="raised button-cancel removeAccountBtn" style="font-size: 0.8em;">
                    Remove
                </button>
            </div>

            <div class="inputContainer" style="margin-top: 0.5em;">
                <label class="inputLabel">Jellyfin User</label>
                <select is="emby-select" class="jellyfinUser"></select>
            </div>

            <div class="inputContainer">
                <label class="inputLabel">Letterboxd Username</label>
                <input is="emby-input" type="text" class="lbUsername" />
            </div>

            <div class="inputContainer">
                <label class="inputLabel">Letterboxd Password</label>
                <input is="emby-input" type="password" class="lbPassword" />
            </div>

            <div class="inputContainer">
                <label class="inputLabel">Raw Cookies (optional, for Cloudflare bypass)</label>
                <input is="emby-input" type="text" class="rawCookies"
                       placeholder="Paste cookie header from browser if login gets 403" />
            </div>

            <div class="checkboxContainer" style="margin-top: 0.5em;">
                <label>
                    <input is="emby-checkbox" type="checkbox" class="accountEnabled" />
                    <span>Enabled</span>
                </label>
            </div>

            <div class="checkboxContainer">
                <label>
                    <input is="emby-checkbox" type="checkbox" class="syncFavorites" />
                    <span>Sync favorites as liked</span>
                </label>
            </div>

            <div class="checkboxContainer">
                <label>
                    <input is="emby-checkbox" type="checkbox" class="enableDateFilter" />
                    <span>Only sync recently played</span>
                </label>
            </div>

            <div class="inputContainer dateFilterDaysContainer" style="display: none;">
                <label class="inputLabel">Days to look back</label>
                <input is="emby-input" type="number" class="dateFilterDays" min="1" max="365" value="7" />
            </div>
        </div>
    </template>

    <script type="text/javascript" src="letterboxdsyncjs"></script>
</body>
</html>
