name: Telemetry canary

# Daily deterministic regression check over the telemetry fleet — no AI in the loop,
# so every filed issue is reproducible and arguable. Spec:
# openspec/changes/add-opt-in-telemetry/specs/fleet-canary/spec.md
#
# Backend is Cloudflare D1 (never pauses, so no DB keep-alive exists); queries run
# through wrangler with a scoped API token. This workflow still keeps ITSELF alive:
# GitHub disables cron workflows after 60 days without repo activity, so when repo
# activity is older than 50 days a heartbeat timestamp is committed to a dedicated
# non-main branch (never main, where the every-merge-ships pipeline would cut a junk
# release or go red on the version gate).
#
# Definitions (all tunable below):
#   active     = instance with a weekly ping in the trailing 14 days
#   eligible   = instance with >= 2 distinct weekly-ping weeks (Sybil gate)
#   foreground = versions released in the trailing 14 days (from manifest.json), pooled
#   baseline   = everything older, pooled, excluding versions referenced by a
#                still-open canary issue (an unfixed regression can't mask itself)
#   cohort     = an instance belongs to the version of its most recent ping of ANY type
#   rate       = eligible instances with an error-transition ping in the trailing 7 days
#                / active eligible instances in the cohort
# Issue gate: both cohorts n >= MIN_N and foreground rate >= RATE_MULTIPLE x baseline.
# Dedup: open issue labelled telemetry-canary matching (suspect version, category).
# The same run doubles as the row-growth abuse alarm, and any run that cannot reach
# the database fails loudly.

on:
  schedule:
    - cron: "47 17 * * *" # daily, 17:47 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  MIN_N: 10
  RATE_MULTIPLE: 3
  MAX_TOTAL_ROWS: 1000000
  MAX_NEW_INSTANCES_PER_DAY: 500
  D1_DB: lbsync-telemetry

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run checks
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TELEMETRY_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TELEMETRY_CF_ACCOUNT_ID }}
          GH_TOKEN: ${{ github.token }}
        working-directory: worker
        run: |
          set -euo pipefail
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::TELEMETRY_CF_API_TOKEN / TELEMETRY_CF_ACCOUNT_ID secrets not configured."
            exit 1
          fi

          d1() { npx --yes wrangler d1 execute "$D1_DB" --remote --json --command "$1"; }

          # ---- Reachability + growth alarm (abuse detection; loud failure) ----
          GROWTH=$(d1 "SELECT (SELECT COUNT(*) FROM pings) AS total_rows,
                              (SELECT COUNT(DISTINCT instance_id) FROM pings
                               WHERE received_at > datetime('now','-1 day')
                                 AND instance_id NOT IN (
                                   SELECT DISTINCT instance_id FROM pings
                                   WHERE received_at <= datetime('now','-1 day'))) AS new_instances;")
          TOTAL_ROWS=$(echo "$GROWTH" | jq '.[0].results[0].total_rows')
          NEW_INSTANCES=$(echo "$GROWTH" | jq '.[0].results[0].new_instances')
          echo "Total rows: $TOTAL_ROWS; new instances last 24h: $NEW_INSTANCES"
          if [ "$TOTAL_ROWS" -gt "$MAX_TOTAL_ROWS" ] || [ "$NEW_INSTANCES" -gt "$MAX_NEW_INSTANCES_PER_DAY" ]; then
            echo "::error::Telemetry growth alarm: rows=$TOTAL_ROWS new_instances_24h=$NEW_INSTANCES exceed bounds."
            exit 1
          fi

          # ---- Foreground versions: released in the trailing 14 days, per manifest ----
          CUTOFF=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)
          FOREGROUND=$(jq -r --arg cutoff "$CUTOFF" \
            '.[0].versions[] | select(.timestamp > $cutoff) | .version' ../manifest.json | sort -u)
          if [ -z "$FOREGROUND" ]; then
            echo "No versions released in the trailing 14 days; canary is structurally silent today."
            exit 0
          fi
          FG_SQL=$(echo "$FOREGROUND" | sed "s/.*/'&'/" | paste -sd, -)
          echo "Foreground versions: $(echo "$FOREGROUND" | paste -sd' ' -)"

          # ---- Baseline exclusions: versions named in open canary issues ----
          EXCLUDED=$(gh issue list --label telemetry-canary --state open --json title \
            --jq '.[].title | capture("v(?<v>[0-9.]+)").v' 2>/dev/null | sort -u || true)
          EX_SQL="''"
          [ -n "$EXCLUDED" ] && EX_SQL=$(echo "$EXCLUDED" | sed "s/.*/'&'/" | paste -sd, -)
          echo "Baseline exclusions: ${EXCLUDED:-none}"

          COHORT_CTE="
            WITH eligible AS (
              SELECT instance_id FROM pings WHERE ping_type='weekly'
              GROUP BY instance_id HAVING COUNT(DISTINCT week) >= 2
            ),
            active AS (
              SELECT DISTINCT instance_id FROM pings
              WHERE ping_type='weekly' AND received_at > datetime('now','-14 days')
            ),
            cohort AS (
              SELECT p.instance_id, p.plugin_version FROM pings p
              JOIN eligible USING (instance_id) JOIN active USING (instance_id)
              WHERE p.received_at = (SELECT MAX(p2.received_at) FROM pings p2 WHERE p2.instance_id = p.instance_id)
            ),
            grouped AS (
              SELECT instance_id,
                     CASE WHEN plugin_version IN ($FG_SQL) THEN 'fg'
                          WHEN plugin_version IN ($EX_SQL) THEN 'excluded'
                          ELSE 'bg' END AS pool
              FROM cohort
            ),
            tr AS (
              SELECT DISTINCT t.instance_id, cat.category,
                     CASE WHEN t.plugin_version IN ($FG_SQL) THEN 'fg'
                          WHEN t.plugin_version IN ($EX_SQL) THEN 'excluded'
                          ELSE 'bg' END AS pool,
                     t.plugin_version
              FROM pings t
              JOIN eligible e ON e.instance_id = t.instance_id
              CROSS JOIN (SELECT 'cloudflare_403' AS category UNION SELECT 'auth_failure'
                          UNION SELECT 'tmdb_lookup' UNION SELECT 'jellyseerr_error' UNION SELECT 'other') cat
              WHERE t.ping_type='error_transition'
                AND t.received_at > datetime('now','-7 days')
                AND json_extract(t.errors, '\$.state.' || cat.category) = 1
            )"

          POOLS=$(d1 "$COHORT_CTE SELECT pool, COUNT(*) AS n FROM grouped GROUP BY pool;")
          FG_N=$(echo "$POOLS" | jq '[.[0].results[] | select(.pool=="fg") | .n] | first // 0')
          BG_N=$(echo "$POOLS" | jq '[.[0].results[] | select(.pool=="bg") | .n] | first // 0')
          if [ "$FG_N" -lt "$MIN_N" ] || [ "$BG_N" -lt "$MIN_N" ]; then
            echo "Below n gate (fg=$FG_N, bg=$BG_N, need >= $MIN_N each). Silence is correct behaviour."
            exit 0
          fi

          HITS=$(d1 "$COHORT_CTE SELECT category, pool, plugin_version, COUNT(DISTINCT instance_id) AS c FROM tr GROUP BY category, pool, plugin_version;")

          for CAT in cloudflare_403 auth_failure tmdb_lookup jellyseerr_error other; do
            FG_HITS=$(echo "$HITS" | jq --arg c "$CAT" '[.[0].results[] | select(.category==$c and .pool=="fg") | .c] | add // 0')
            BG_HITS=$(echo "$HITS" | jq --arg c "$CAT" '[.[0].results[] | select(.category==$c and .pool=="bg") | .c] | add // 0')
            [ "$FG_HITS" -eq 0 ] && continue
            # Half-instance floor on the baseline avoids divide-by-zero while still
            # requiring a real foreground signal (>= 3 affected instances).
            TRIPPED=$(jq -n --argjson fh "$FG_HITS" --argjson bh "$BG_HITS" \
              --argjson fn "$FG_N" --argjson bn "$BG_N" --argjson mult "$RATE_MULTIPLE" \
              '(($fh / $fn) / (([$bh, 0.5] | max) / $bn)) >= $mult and $fh >= 3')
            [ "$TRIPPED" != "true" ] && continue

            SUSPECT=$(echo "$HITS" | jq -r --arg c "$CAT" '[.[0].results[] | select(.category==$c and .pool=="fg")] | max_by(.c) | .plugin_version')
            TITLE="Telemetry canary: $CAT regression in v$SUSPECT"

            if gh issue list --label telemetry-canary --state open --search "\"$TITLE\" in:title" --json number --jq 'length' | grep -qv '^0$'; then
              echo "Dedup: open issue already exists for ($SUSPECT, $CAT)."
              continue
            fi

            EVIDENCE=$(echo "$HITS" | jq -r --arg c "$CAT" '[.[0].results[] | select(.category==$c and .pool=="fg")] | map("| \(.plugin_version) | \(.c) |") | join("\n")')
            gh issue create --label telemetry-canary \
              --title "$TITLE" \
              --body "$(printf 'Automated fleet-canary finding. No AI involved; the queries in .github/workflows/telemetry-canary.yml reproduce it.\n\n**Category:** %s\n**Foreground** (versions released in trailing 14 days, pooled): %s of %s active eligible instances hit a %s error-transition in the trailing 7 days.\n**Baseline** (older versions pooled, exclusions applied): %s of %s.\n\n**Per-version evidence (foreground):**\n\n| version | instances |\n|---|---|\n%s\n\nThresholds: n >= %s both cohorts, rate multiple >= %sx.\n' "$CAT" "$FG_HITS" "$FG_N" "$CAT" "$BG_HITS" "$BG_N" "$EVIDENCE" "$MIN_N" "$RATE_MULTIPLE")"
            echo "Filed: $TITLE"
          done

      - name: Self-sustain against GitHub's 60-day cron auto-disable
        run: |
          set -euo pipefail
          git fetch origin 'refs/heads/*:refs/remotes/origin/*' --quiet
          NEWEST=$(git for-each-ref --sort=-committerdate --format='%(committerdate:unix)' refs/remotes/origin | head -1)
          AGE_DAYS=$(( ( $(date +%s) - NEWEST ) / 86400 ))
          echo "Most recent repo activity: ${AGE_DAYS} day(s) ago."
          if [ "$AGE_DAYS" -lt 50 ]; then
            echo "No heartbeat needed."
            exit 0
          fi
          git config user.name "telemetry-canary"
          git config user.email "actions@github.com"
          git checkout -B telemetry-heartbeat origin/telemetry-heartbeat 2>/dev/null || git checkout --orphan telemetry-heartbeat
          git rm -rf --cached . 2>/dev/null || true
          date -u +%Y-%m-%dT%H:%M:%SZ > heartbeat.txt
          git add heartbeat.txt
          git commit -m "telemetry canary heartbeat"
          git push origin telemetry-heartbeat
          echo "Heartbeat committed to telemetry-heartbeat branch."
