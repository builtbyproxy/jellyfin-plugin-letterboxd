name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate manifest.json
        # manifest.json is CI-managed (see release.yml). This guards the two
        # ways it can be poisoned by hand: a PLACEHOLDER checksum left in,
        # or a sourceUrl that no longer resolves (release deleted/renamed).
        run: |
          set -e
          if grep -q PLACEHOLDER manifest.json; then
            echo "::error::manifest.json contains PLACEHOLDER. Manifest entries are inserted by release.yml after a successful build — do not pre-commit them. See CLAUDE.md > Releasing."
            exit 1
          fi
          fail=0
          while IFS= read -r url; do
            code=$(curl -sIL -o /dev/null -w '%{http_code}' "$url")
            if [ "$code" != "200" ]; then
              echo "::error::manifest sourceUrl returned HTTP $code: $url"
              fail=1
            fi
          done < <(jq -r '.[0].versions[].sourceUrl' manifest.json)
          exit $fail

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        # XPlat Code Coverage uses coverlet.collector (already a test-project dep)
        # to emit Cobertura XML under TestResults/<guid>/coverage.cobertura.xml.
        # Integration tests are filtered out: they hit live Letterboxd and would
        # skip silently here without secrets, but excluding them keeps the run
        # honest about what was exercised. The integration.yml workflow runs them
        # on demand with credentials wired in.
        run: dotnet test -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults --filter "Category!=Integration"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
          verbose: true
