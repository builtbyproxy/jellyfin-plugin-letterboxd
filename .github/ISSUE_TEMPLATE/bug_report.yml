name: Bug report
description: Something isn't working, such as sync, lookups, auth, Cloudflare, or the dashboard.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. The more of the fields below you fill in, the faster this can be diagnosed. Most sync issues come down to your version, which sync path you're on, and what the logs say.

        Before submitting, please skim the [Cloudflare troubleshooting](https://github.com/builtbyproxy/jellyfin-plugin-letterboxd#cloudflare-issues) section. A large share of "films won't sync" reports turn out to be an expired or mismatched `cf_clearance` cookie.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I'm on the latest version of the plugin, or I've noted my version below.
          required: true
        - label: I don't have any other Letterboxd-related Jellyfin plugins installed.
          required: true
        - label: For sync or lookup failures, I've read the Cloudflare troubleshooting section in the README.
          required: false

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: "Jellyfin, then Dashboard, then Plugins, then Letterboxd Sync. Please give the exact version."
      placeholder: "e.g. 1.18.4.0"
    validations:
      required: true

  - type: input
    id: jellyfin-version
    attributes:
      label: Jellyfin version
      description: "Jellyfin, then Dashboard, then the server version at the bottom of the page."
      placeholder: "e.g. 10.10.6"
    validations:
      required: true

  - type: dropdown
    id: telemetry-enabled
    attributes:
      label: Do you have anonymous telemetry enabled?
      description: "Settings, then Anonymous Telemetry. It's off by default."
      options:
        - "No"
        - "Yes"
        - Not sure
      default: 0
    validations:
      required: true

  - type: dropdown
    id: sync-mode
    attributes:
      label: Which sync path are you on?
      description: >
        Check your Jellyfin logs for a line saying either "Using official Letterboxd API" or
        "Using web scraping fallback". This narrows things down a lot. Pick "Not sure" if you can't find it.
      options:
        - Not sure
        - Official Letterboxd API
        - Web scraping fallback
      default: 0
    validations:
      required: true

  - type: input
    id: telemetry-instance-id
    attributes:
      label: Telemetry instance ID (optional)
      description: >
        Only if telemetry is enabled and you're comfortable sharing it. Find it in Settings, then
        Anonymous Telemetry, then Preview exact JSON (the `instance_id` field). This lets us correlate your
        report with your anonymous pings. Heads up, pasting it into a public issue links that ID to your past
        pings. If you'd rather not, the preview modal has a "Copy + regenerate ID" option.
      placeholder: "e.g. 8a6f4f6e-1f2b-4c43-9a57-2f0e6f3b9d1c"
    validations:
      required: false

  - type: input
    id: log-reference-code
    attributes:
      label: Did you send a log bundle to the developer? (optional)
      description: >
        The Logs tab has a "Send logs to developer" button that uploads your recent logs privately and
        gives you a reference code. Paste it here so we can pull the bundle.
      placeholder: "e.g. LBX-7Q2F9K"
    validations:
      required: false

  - type: textarea
    id: what-is-wrong
    attributes:
      label: What's going wrong?
      description: Describe the problem, what you expected to happen, and what actually happened. Include steps to reproduce if you can.
      placeholder: |
        e.g. Films I watch aren't appearing in my Letterboxd diary. I finished a film yesterday and ran the sync task manually, but nothing showed up. I expected it to be logged to my diary.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output (optional)
      description: >
        Paste any relevant lines from the Logs tab. Passwords, cookies, and auth tokens are never logged,
        but feel free to redact your Letterboxd username or film titles if you prefer. This is rendered as a
        code block, so no need for backticks.
      render: shell
    validations:
      required: false

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: Screenshots, your setup (Docker, reverse proxy, VPN), or any other context that might help.
    validations:
      required: false
